<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>過去成績</title>
<style>
:root{ color-scheme: dark; }
*{ box-sizing:border-box; }
body{
  margin:0; background:#0d1b2a; color:#e8eef4;
  font-family:'Hiragino Kaku Gothic Pro','Meiryo',system-ui,sans-serif;
  -webkit-text-size-adjust:100%;
}
.wrap{ max-width:820px; margin:0 auto; padding:14px 14px 60px; }
.top{ display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
h1{ font-size:22px; margin:0; letter-spacing:1px; }
.back{
  color:#cfe0f0; text-decoration:none; font-size:14px;
  border:1px solid #35506e; border-radius:18px; padding:6px 14px; background:rgba(255,255,255,.04);
}
.back:active{ transform:translateY(1px); }
.note{ color:#9fb3c8; font-size:13px; margin:0 0 12px; }
.controls{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
#q{
  flex:1; min-width:160px; padding:10px 12px; font-size:16px;
  background:#13273b; border:1px solid #35506e; border-radius:10px; color:#e8eef4;
}
.sorts{ display:flex; gap:6px; flex-wrap:wrap; }
.sortbtn{
  background:#13273b; color:#cfe0f0; border:1px solid #35506e; border-radius:16px;
  padding:7px 12px; font-size:13px; cursor:pointer;
}
.sortbtn.active{ background:#1f6feb; border-color:#1f6feb; color:#fff; }
#list{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
table{ width:100%; border-collapse:collapse; }
th,td{ padding:9px 6px; border-bottom:1px solid #22384f; text-align:right; white-space:nowrap; }
th{ color:#9fb3c8; font-size:12px; font-weight:normal; background:#0d1b2a; }
thead tr:first-child th{ position:sticky; top:0; z-index:2; }
thead tr:last-child th{ position:sticky; top:30px; z-index:2; }
th.l,td.l{ text-align:left; }
/* 大項目（オープン／限定）のグループ見出し */
th.grp{ text-align:center; font-size:12px; font-weight:bold; letter-spacing:1px;
        border-bottom:1px solid #35506e; }
th.grp-open{ color:#7fc4ff; }
th.grp-ltd{ color:#ffb37f; }
/* 区分の境目に縦罫を入れて左右を見分けやすくする */
th.sep, td.sep{ border-left:1px solid #2c455f; }
/* 数値の下に添える割合 */
.pct{ display:block; font-size:10px; color:#7f97ad; font-weight:normal; margin-top:1px; }
.zero{ color:#54708a; }
tr.r{ cursor:pointer; }
tr.r:active{ background:#13273b; }
.rank{ color:#7f97ad; width:2.4em; }
.nm{ font-size:16px; color:#e8eef4; }
.jr{ font-size:11px; color:#0d1b2a; background:#7fc4ff; border-radius:4px; padding:1px 5px; margin-left:6px; }
.win{ color:#ffd45e; font-weight:bold; }
.pod{ color:#cdd8e3; font-weight:bold; }
.small{ color:#7f97ad; }
.detail td{ background:#0a1622; }
.dwrap{ padding:4px 2px 10px; }
.dsum{ color:#9fb3c8; font-size:13px; margin-bottom:8px; }
.dtable{ width:100%; border-collapse:collapse; }
.dtable td{ border-bottom:1px solid #1a2c40; font-size:13px; }
.res1{ color:#ffd45e; font-weight:bold; }
.res23{ color:#cdd8e3; font-weight:bold; }
.resx{ color:#6b8299; }
.empty{ color:#9fb3c8; text-align:center; padding:26px 0; }
.loading{ color:#7f97ad; padding:8px 2px; font-size:13px; }
@media(max-width:600px){
  h1{ font-size:19px; }
  .nm{ font-size:15px; }
}

/* ===== 狭い画面用のカード表示 =====
   7列のテーブルはスマホ幅だと横スクロールが必須になり実用的でないため、
   640px以下では1レーサー＝1カードに切り替える（JS側で描画を出し分ける）。 */
.rcard{
  background:#101f31; border:1px solid #22384f; border-radius:12px;
  padding:10px 12px; margin-bottom:8px; cursor:pointer;
}
.rcard:active{ background:#16283c; }
.rcard.open{ border-color:#35506e; }
.rhead{ display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.rhead .rank{ color:#7f97ad; font-size:13px; min-width:1.8em; }
.rhead .nm{ font-size:17px; font-weight:bold; flex:1; min-width:0;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rhead .tot{ color:#7f97ad; font-size:12px; white-space:nowrap; }
.segs{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.seg{ background:#0b1828; border-radius:8px; padding:7px 9px; }
.seg-open{ border-left:3px solid #7fc4ff; }
.seg-ltd{ border-left:3px solid #ffb37f; }
.seglabel{ font-size:11px; letter-spacing:1px; margin-bottom:5px; }
.seg-open .seglabel{ color:#7fc4ff; }
.seg-ltd .seglabel{ color:#ffb37f; }
.segrow{ display:flex; align-items:baseline; gap:4px; font-size:12px;
         color:#9fb3c8; padding:2px 0; }
.segrow .k{ flex:1; }
.segrow .v{ font-size:15px; font-weight:bold; color:#e8eef4; }
.segrow .v.win{ color:#ffd45e; }
.segrow .v.pod{ color:#cdd8e3; }
.segrow .v.zero{ color:#54708a; font-weight:normal; }
.segrow .p{ font-size:10px; color:#7f97ad; min-width:3.2em; text-align:right; }
.seg.none{ opacity:.45; }
.rdetail{ margin-top:10px; border-top:1px solid #22384f; padding-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>過去成績</h1>
    <a class="back" href="{{ back_href }}">← 観覧に戻る</a>
  </div>
  <p class="note">確定した大会（{{ race_total }}大会：オープン {{ open_total }} ／ 限定 {{ ltd_total }}）をもとに集計しています。カッコ内は参加数に対する割合です。名前をタップすると大会ごとの結果が開きます。</p>

  <div class="controls">
    <input id="q" type="search" placeholder="レーサー名で検索" oninput="render()">
    <div class="sorts">
      <button class="sortbtn active" data-s="wins" onclick="setSort('wins')">優勝順</button>
      <button class="sortbtn" data-s="podiums" onclick="setSort('podiums')">入賞順</button>
      <button class="sortbtn" data-s="races" onclick="setSort('races')">参加順</button>
      <button class="sortbtn" data-s="yomi" onclick="setSort('yomi')">五十音</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
var PREFIX = "{{ prefix }}";
var RACERS = {{ racers | tojson }};
var sortKey = 'wins';
var openId = null;
var detailCache = {};

// 数値セル。denom を渡すと「数値＋(割合%)」を表示する。
// 0件のときは色を落として見やすくし、参加0なら割合は出さない（0除算・意味なし対策）。
function numCell(val, denom, cls, isSep){
  var v = val || 0;
  var sep = isSep ? ' sep' : '';
  if(!v && (denom === null || !denom)){
    return '<td class="' + cls + sep + '"><span class="zero">0</span></td>';
  }
  var body = '<span class="' + (v ? '' : 'zero') + '">' + v + '</span>';
  if(denom){
    body += '<span class="pct">' + Math.round(v / denom * 100) + '%</span>';
  }
  return '<td class="' + cls + sep + '">' + body + '</td>';
}

function escHtml(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setSort(k){
  sortKey = k;
  var btns = document.querySelectorAll('.sortbtn');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-s') === k); }
  render();
}

function sortedFiltered(){
  var q = (document.getElementById('q').value || '').trim().toLowerCase();
  var arr = RACERS.filter(function(r){
    if(!q) return true;
    return (r.name || '').toLowerCase().indexOf(q) >= 0 || (r.yomi || '').toLowerCase().indexOf(q) >= 0;
  });
  arr.sort(function(a,b){
    if(sortKey === 'yomi'){ return (a.yomi||'').localeCompare(b.yomi||'', 'ja') || (a.name||'').localeCompare(b.name||'','ja'); }
    if(a[sortKey] !== b[sortKey]) return b[sortKey] - a[sortKey];
    if(b.wins !== a.wins) return b.wins - a.wins;
    if(b.podiums !== a.podiums) return b.podiums - a.podiums;
    return (a.yomi||'').localeCompare(b.yomi||'','ja');
  });
  return arr;
}

// 640px以下ではカード表示（横スクロール不要）、それより広ければ表表示に切り替える
function isNarrow(){
  try { return window.matchMedia('(max-width:640px)').matches; } catch(e){ return false; }
}

function render(){
  var arr = sortedFiltered();
  var list = document.getElementById('list');
  if(!arr.length){ list.innerHTML = '<div class="empty">該当するレーサーがいません。</div>'; return; }
  if(isNarrow()){ renderCards(arr, list); return; }
  var h = '<table><thead>'
    + '<tr>'
    +   '<th class="l" rowspan="2">レーサー</th>'
    +   '<th class="grp grp-open sep" colspan="3">オープン</th>'
    +   '<th class="grp grp-ltd sep" colspan="3">限定</th>'
    + '</tr>'
    + '<tr>'
    +   '<th class="sep">参加</th><th>優勝</th><th>入賞</th>'
    +   '<th class="sep">参加</th><th>優勝</th><th>入賞</th>'
    + '</tr>'
    + '</thead><tbody>';
  arr.forEach(function(r, i){
    var jr = r.jr ? '<span class="jr">Jr.</span>' : '';
    h += '<tr class="r" onclick="toggle(' + r.id + ')">'
      + '<td class="l"><span class="rank">' + (i + 1) + '</span><span class="nm">' + escHtml(r.name) + '</span>' + jr + '</td>'
      + numCell(r.open_races, null, 'small', true)
      + numCell(r.open_wins,    r.open_races, 'win')
      + numCell(r.open_podiums, r.open_races, 'pod')
      + numCell(r.ltd_races, null, 'small', true)
      + numCell(r.ltd_wins,    r.ltd_races, 'win')
      + numCell(r.ltd_podiums, r.ltd_races, 'pod')
      + '</tr>';
    if(openId === r.id){
      h += '<tr class="detail"><td colspan="7"><div class="dwrap" id="d' + r.id + '"><div class="loading">読み込み中...</div></div></td></tr>';
    }
  });
  h += '</tbody></table>';
  list.innerHTML = h;
  if(openId != null) loadDetail(openId);
}

// 1レーサー＝1カード。オープン／限定を左右に並べ、参加・優勝・入賞を縦に積む。
function segBlock(title, cls, races, wins, pods){
  var none = races ? '' : ' none';
  function row(label, v, kls){
    var val = v || 0;
    var pct = races ? Math.round(val / races * 100) + '%' : '';
    return '<div class="segrow"><span class="k">' + label + '</span>'
         + '<span class="v ' + kls + (val ? '' : ' zero') + '">' + val + '</span>'
         + '<span class="p">' + pct + '</span></div>';
  }
  return '<div class="seg ' + cls + none + '">'
       + '<div class="seglabel">' + title + '</div>'
       + '<div class="segrow"><span class="k">参加</span>'
       +   '<span class="v' + (races ? '' : ' zero') + '">' + (races || 0) + '</span>'
       +   '<span class="p"></span></div>'
       + row('優勝', wins, 'win')
       + row('入賞', pods, 'pod')
       + '</div>';
}

function renderCards(arr, list){
  var h = '';
  arr.forEach(function(r, i){
    var jr = r.jr ? '<span class="jr">Jr.</span>' : '';
    h += '<div class="rcard' + (openId === r.id ? ' open' : '') + '" onclick="toggle(' + r.id + ')">'
      +   '<div class="rhead">'
      +     '<span class="rank">' + (i + 1) + '</span>'
      +     '<span class="nm">' + escHtml(r.name) + '</span>' + jr
      +     '<span class="tot">全' + (r.races || 0) + '戦 / 優勝' + (r.wins || 0) + '</span>'
      +   '</div>'
      +   '<div class="segs">'
      +     segBlock('オープン', 'seg-open', r.open_races, r.open_wins, r.open_podiums)
      +     segBlock('限定',     'seg-ltd',  r.ltd_races,  r.ltd_wins,  r.ltd_podiums)
      +   '</div>';
    if(openId === r.id){
      h += '<div class="rdetail"><div class="dwrap" id="d' + r.id + '"><div class="loading">読み込み中...</div></div></div>';
    }
    h += '</div>';
  });
  list.innerHTML = h;
  if(openId != null) loadDetail(openId);
}

function toggle(id){
  openId = (openId === id) ? null : id;
  render();
}

async function loadDetail(id){
  var box = document.getElementById('d' + id);
  if(!box) return;
  if(detailCache[id]){ box.innerHTML = detailCache[id]; return; }
  try{
    var r = await fetch(PREFIX + '/api/history/racer/' + id, {cache:'no-store'});
    var d = await r.json();
    var html = '<div class="dsum">参加 ' + d.race_count + ' ・ 優勝率 ' + d.win_rate + '% ・ 入賞率 ' + d.podium_rate + '%</div>';
    if(d.rows && d.rows.length){
      html += '<table class="dtable">';
      d.rows.forEach(function(row){
        var cls = row.result === '1位' ? 'res1' : (row.result === '2位' || row.result === '3位' ? 'res23' : 'resx');
        html += '<tr>'
          + '<td class="l small" style="white-space:nowrap">' + escHtml(row.date) + '</td>'
          + '<td class="l" style="width:99%">' + escHtml(row.name) + '</td>'
          + '<td class="' + cls + '">' + escHtml(row.result) + '</td>'
          + '</tr>';
      });
      html += '</table>';
    } else {
      html += '<div class="small">確定した大会の記録がありません。</div>';
    }
    detailCache[id] = html;
    box.innerHTML = html;
  }catch(e){
    box.innerHTML = '<div class="small">読み込みに失敗しました。</div>';
  }
}

// 画面回転やウィンドウ幅の変化で 表⇔カード を切り替える
var _rzTimer = null;
var _wasNarrow = isNarrow();
window.addEventListener('resize', function(){
  clearTimeout(_rzTimer);
  _rzTimer = setTimeout(function(){
    var n = isNarrow();
    if(n !== _wasNarrow){ _wasNarrow = n; render(); }
  }, 200);
});

render();
</script>
</body>
</html>
