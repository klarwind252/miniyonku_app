<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お試しプレイ 予約 | ミニ四駆レース管理システム</title>
  <style>
    :root { --accent:#D4AF37; --accent-d:#8B6508; --ink:#2c3e50; --muted:#7a8794; --line:#e3e7ec; }
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;
           color:var(--ink); background:#f4f5f7; margin:0; padding:24px 14px; }
    .wrap { max-width:560px; margin:0 auto; background:#fff; border-radius:14px;
            box-shadow:0 4px 20px rgba(0,0,0,.07); padding:22px 20px 26px; }
    h1 { font-size:1.2rem; margin:0 0 4px; }
    .lead { color:var(--muted); font-size:.9rem; margin:0 0 18px; line-height:1.6; }
    .note { background:#fff8e6; border:1px solid #f0e2b8; color:#7a5b00;
            border-radius:10px; padding:10px 12px; font-size:.85rem; line-height:1.6; margin:14px 0; }
    label { display:block; font-weight:700; margin:18px 0 6px; font-size:.92rem; }
    input[type=email] { width:100%; padding:.6rem .7rem; border:1px solid #ccd2d9;
                        border-radius:9px; font-size:1rem; }
    .err { background:#fdecec; color:#a12; border:1px solid #f3c2c2; border-radius:10px;
           padding:.6rem .8rem; margin:6px 0 4px; font-size:.9rem; }
    .days { display:flex; gap:8px; overflow-x:auto; padding:4px 2px 8px; }
    .day { flex:0 0 auto; border:1px solid var(--line); background:#fff; border-radius:10px;
           padding:8px 12px; text-align:center; cursor:pointer; min-width:66px; font-size:.82rem; }
    .day .wd { display:block; font-size:.78rem; line-height:1.2; }
    .day .md { display:block; font-size:1.05rem; font-weight:700; line-height:1.25; }
    .day.sel { border-color:var(--accent); background:#fffaf0;
               box-shadow:0 0 0 2px rgba(212,175,55,.25) inset; }

    /* タイムテーブル（縦並び） */
    .tt { margin-top:10px; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    .tt-row { display:flex; align-items:center; gap:12px; padding:14px 14px;
              border-bottom:1px solid var(--line); cursor:pointer; }
    .tt-row:last-child { border-bottom:0; }
    .tt-row .time { font-size:1.05rem; font-weight:700; letter-spacing:.02em; }
    .tt-row .bar { flex:1; }
    .tt-row .status { font-size:.85rem; font-weight:700; padding:4px 12px; border-radius:999px;
                      background:#eef7ee; color:#2e7d32; white-space:nowrap; }
    .tt-row.full { cursor:not-allowed; background:#fafbfc; color:#aab2ba; }
    .tt-row.full .time { color:#aab2ba; font-weight:600; }
    .tt-row.full .status { background:#f2f3f5; color:#98a1aa; }
    .tt-row.sel { background:#fffaf0; box-shadow:0 0 0 2px rgba(212,175,55,.28) inset; }
    .tt-row.sel .time { color:var(--accent-d); }
    .tt-row .check { width:20px; text-align:center; color:var(--accent-d); font-weight:900; visibility:hidden; }
    .tt-row.sel .check { visibility:visible; }
    .tt-empty { padding:16px 14px; color:var(--muted); font-size:.9rem; text-align:center; }

    .picked { margin-top:12px; font-size:.92rem; }
    .picked b { color:var(--accent-d); }
    .hp { position:absolute; left:-9999px; }
    .agree { display:flex; align-items:flex-start; gap:8px; margin-top:16px; font-size:.86rem;
             color:var(--ink); line-height:1.5; }
    .agree input { margin-top:3px; }
    button { margin-top:20px; width:100%; padding:.85rem; border:0; border-radius:11px;
             background:linear-gradient(135deg,var(--accent),var(--accent-d)); color:#fff;
             font-size:1rem; font-weight:800; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>お試しプレイのご予約</h1>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <div class="note">
      ご希望の日時をカレンダーから選び、メールアドレスを入力して送信してください。<br>
      ご登録のメールアドレスに、お試し用のURLを自動でお送りします。
    </div>

    <form method="post" action="/reserve" id="resform" autocomplete="off">
      <label>1. 日付を選ぶ</label>
      <div class="days" id="days">
        {% for d in days %}
          <div class="day" data-day="{{ d }}">
            <span class="wd"></span>
            <span class="md">{{ d[5:7]|int }}/{{ d[8:10]|int }}</span>
          </div>
        {% endfor %}
      </div>

      <label>2. 時間帯を選ぶ（1枠 {{ slot_minutes }}分・固定）</label>
      <div class="tt" id="tt"><div class="tt-empty">読み込み中…</div></div>

      <div class="picked" id="picked"></div>

      <label for="email">3. メールアドレス</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">

      <input type="hidden" name="slot" id="slot" value="">

      <label class="agree">
        <input type="checkbox" name="agree" value="1" id="agree" required>
        <span>メールアドレスはお試し用のURLの自動送信以外には用いません。</span>
      </label>

      <div class="hp"><label>Website</label><input type="text" name="website" tabindex="-1"></div>

      <button type="submit" id="submit" disabled>この内容で予約する</button>
    </form>
  </div>

<script>
(function () {
  var WD = ["日","月","火","水","木","金","土"];
  var daysEl = document.getElementById("days");
  var ttEl = document.getElementById("tt");
  var slotInput = document.getElementById("slot");
  var pickedEl = document.getElementById("picked");
  var submitBtn = document.getElementById("submit");
  var emailEl = document.getElementById("email");
  var agreeEl = document.getElementById("agree");
  var selDay = null, selSlot = null;

  var dayEls = Array.prototype.slice.call(daysEl.querySelectorAll(".day"));
  dayEls.forEach(function (el) {
    var d = new Date(el.dataset.day + "T00:00:00");
    el.querySelector(".wd").textContent = "（" + WD[d.getDay()] + "）";
    if (d.getDay() === 0) el.style.color = "#c0392b";
    if (d.getDay() === 6) el.style.color = "#2980b9";
    el.addEventListener("click", function () { selectDay(el); });
  });

  function refreshSubmit() {
    submitBtn.disabled = !(selSlot && emailEl.value && agreeEl.checked);
  }
  emailEl.addEventListener("input", refreshSubmit);
  agreeEl.addEventListener("change", refreshSubmit);

  function selectDay(el) {
    dayEls.forEach(function (d) { d.classList.remove("sel"); });
    el.classList.add("sel");
    selDay = el.dataset.day;
    selSlot = null; slotInput.value = ""; pickedEl.textContent = ""; refreshSubmit();
    ttEl.innerHTML = '<div class="tt-empty">読み込み中…</div>';
    fetch("/reserve/availability?day=" + encodeURIComponent(selDay))
      .then(function (r) { return r.json(); })
      .then(function (data) { renderTable(data.slots || []); })
      .catch(function () { ttEl.innerHTML = '<div class="tt-empty">取得に失敗しました。</div>'; });
  }

  function renderTable(slots) {
    ttEl.innerHTML = "";
    if (!slots.length) { ttEl.innerHTML = '<div class="tt-empty">予約できる枠がありません。</div>'; return; }
    slots.forEach(function (s) {
      var row = document.createElement("div");
      row.className = "tt-row" + (s.available ? "" : " full");
      row.innerHTML =
        '<span class="check">✓</span>' +
        '<span class="time">' + s.label + ' 〜 ' + s.end_label + '</span>' +
        '<span class="bar"></span>' +
        '<span class="status">' + (s.available ? '予約可' : '満席') + '</span>';
      if (s.available) {
        row.addEventListener("click", function () {
          ttEl.querySelectorAll(".tt-row").forEach(function (x) { x.classList.remove("sel"); });
          row.classList.add("sel");
          selSlot = s.start; slotInput.value = s.start;
          pickedEl.innerHTML = "選択中： <b>" + s.start + " 〜 " + s.end_label + "</b>";
          refreshSubmit();
        });
      }
      ttEl.appendChild(row);
    });
  }

  document.getElementById("resform").addEventListener("submit", function (e) {
    if (!slotInput.value) { e.preventDefault(); alert("時間帯を選んでください。"); }
  });

  // 開いた直後に先頭の日付を自動選択して、すぐ時間帯を表示する
  if (dayEls.length) { selectDay(dayEls[0]); }
})();
</script>
</body>
</html>
