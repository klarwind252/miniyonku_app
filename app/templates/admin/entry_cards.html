<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>エントリーカード印刷 - {{ t.name }}</title>
<link href="/static/fonts/cert_fonts.css" rel="stylesheet">
<script src="/static/js/qrcode.min.js"></script>
<script src="/static/js/JsBarcode.code128.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif; background: #f4f5f7; color: #2c3e50; }

  /* ===== 操作バー（印刷時は非表示） ===== */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: #fff; border-bottom: 1px solid #dee2e6;
    padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
  }
  .toolbar h1 { font-size: 16px; margin: 0 16px 0 0; }
  .toolbar label { font-size: 14px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .toolbar .group { display: flex; gap: 12px; align-items: center; padding-right: 16px; border-right: 1px solid #e9ecef; }
  .toolbar input[type="number"] { width: 64px; padding: 4px 6px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
  .btn {
    padding: 8px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold;
    cursor: pointer; text-decoration: none; display: inline-block;
  }
  .btn-print { background: #0078d4; color: #fff; }
  .btn-back { background: #e9ecef; color: #2c3e50; }

  /* ===== 用紙・カード ===== */
  .sheet { padding: 16px; display: flex; flex-wrap: wrap; gap: 0; align-content: flex-start; justify-content: flex-start; }

  .card {
    border: 1px dashed #b0b0b0; background: #fff;
    padding: 4mm; display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; text-align: center; overflow: hidden; page-break-inside: avoid;
  }
  /* 名刺サイズ 91×55mm */
  body.size-meishi .card { width: 91mm; height: 55mm; }
  /* 公式大会サイズ（A4で6枚取り：2列×3行）95×90mm */
  body.size-official .card { width: 95mm; height: 90mm; }

  .card .race-name { font-size: 12px; font-weight: bold; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
  .card .code-area { display: flex; align-items: center; justify-content: center; flex: 1; width: 100%; min-height: 0; padding: 1mm 0; }
  .card .code-area svg, .card .code-area canvas, .card .code-area img { max-width: 100%; max-height: 100%; height: auto; }
  /* QRはできるだけ大きく（カード高さに収まる範囲で幅いっぱい） */
  body.code-qr.size-meishi .card .code-area img,
  body.code-qr.size-meishi .card .code-area canvas { width: 26mm; height: 26mm; }
  body.code-qr.size-official .card .code-area img,
  body.code-qr.size-official .card .code-area canvas { width: 42mm; height: 42mm; }
  /* CODE128は幅いっぱいに伸ばす */
  body.code-code128 .card .code-area svg { width: 100%; }
  .card .code-num { font-size: 12px; letter-spacing: 1px; font-family: "SFMono-Regular", Consolas, monospace; }
  .card .racer-name { font-size: 18px; font-weight: bold; min-height: 1.4em; }
  body.size-official .card .racer-name { font-size: 18px; }
  body.size-official .card .race-name { font-size: 15px; }
  body.size-official .card .code-num { font-size: 14px; }

  .blank-note { font-size: 10px; color: #aaa; }

  /* ===== テンプレート適用モードのカード ===== */
  .tpl-card {
    position: relative; background: #fff; overflow: hidden;
    border: 1px dashed #b0b0b0; background-repeat: no-repeat;
    page-break-inside: avoid;
  }

  @media print {
    body { background: #fff; }
    .toolbar { display: none !important; }
    .sheet { padding: 0; gap: 0; }
    .card { border: 1px dashed #ccc; margin: 0; }
    .tpl-card { border: 1px dashed #ccc; margin: 0; }
    @page { size: A4; margin: 8mm; }
  }
</style>
</head>
<body class="size-meishi code-qr">

  <div class="toolbar">
    <h1>エントリーカード印刷</h1>
    <div class="group">
      <span style="font-size:14px;color:#636e72">テンプレート</span>
      <select id="tplSelect" onchange="applyView()" style="padding:4px 8px;border:1px solid #ced4da;border-radius:4px;font-size:14px">
        {% for tpl in card_templates %}
        <option value="{{ tpl.id }}">{{ tpl.name }}（{% if tpl.card_size == 'official' %}公式大会{% else %}名刺{% endif %}/{% if tpl.code_type == 'code128' %}バーコード{% else %}QR{% endif %}）</option>
        {% endfor %}
      </select>
    </div>
    <div class="group" id="std-controls" style="display:none">
      <span style="font-size:14px;color:#636e72">コード</span>
      <label><input type="radio" name="codetype" value="qr" checked onchange="setCodeType('qr')"> QR</label>
      <label><input type="radio" name="codetype" value="code128" onchange="setCodeType('code128')"> CODE128</label>
    </div>
    <div class="group" id="std-size-controls" style="display:none">
      <span style="font-size:14px;color:#636e72">サイズ</span>
      <label><input type="radio" name="cardsize" value="meishi" checked onchange="setSize('meishi')"> 名刺(91×55)</label>
      <label><input type="radio" name="cardsize" value="official" onchange="setSize('official')"> 公式大会(95×90)</label>
    </div>
    <div class="group">
      <span style="font-size:14px;color:#636e72">飛び込み参加枠</span>
      <form method="get" style="display:flex;gap:6px;align-items:center" onsubmit="return true">
        <input type="number" name="extra" min="0" max="9999" value="{{ extra }}">
        <button type="submit" class="btn btn-back" style="padding:4px 12px">反映</button>
      </form>
    </div>
    <button type="button" class="btn btn-print" onclick="window.print()">🖨 印刷</button>
    <button type="button" class="btn btn-back" onclick="window.close()">✕ 閉じる</button>
  </div>

  <div class="sheet" id="sheet">
    {% for c in cards %}
    <div class="card">
      <div class="race-name">{{ t.name }}</div>
      <div class="code-area" data-code="{{ c.code }}"></div>
      <div class="code-num">{{ c.code }}</div>
      <div class="racer-name">{% if c.blank %}{% else %}{{ c.name }}{% endif %}</div>
    </div>
    {% endfor %}
  </div>

  {% if not cards %}
  <div style="padding:40px;text-align:center;color:#95a5a6">
    印刷するカードがありません。事前エントリーを登録するか、飛び込み用の空白枚数を指定してください。
  </div>
  {% endif %}

<script>
  // ===== サーバから渡されたデータ =====
  const CARDS = {{ cards | tojson }};
  const CARD_TEMPLATES = {{ card_templates | tojson }};
  const RACE_NAME = {{ t.name | tojson }};
  const MM2PX = 3.7795;                       // 1mm = 3.7795px（96dpi）。エディタと同一
  const CARD_DIMS = { meishi: [91, 55], official: [95, 90] };

  // テンプレートのobjectsが空のときに使う既定配置（エディタのdefaultObjsと同一）
  function defaultCardObjs() {
    return [
      { id:'race_name', label:'大会名', field:'{race_name}',
        x:12, y:8, w:320, h:22,
        fontSize:13, fontFamily:'sans-serif', fontWeight:'bold', fontStyle:'normal',
        color:'#1a1a1a', align:'center', verticalAlign:'middle', letterSpacing:0, lineHeight:1.2 },
      { id:'code', type:'code', label:'コード',
        x:122, y:34, w:100, h:100 },
      { id:'seq', label:'連番', field:'{seq}',
        x:12, y:140, w:320, h:18,
        fontSize:12, fontFamily:'monospace', fontWeight:'normal', fontStyle:'normal',
        color:'#333333', align:'center', verticalAlign:'middle', letterSpacing:1, lineHeight:1.2 },
      { id:'racer_name', label:'レーサー名', field:'{racer_name}',
        x:12, y:162, w:320, h:36,
        fontSize:20, fontFamily:'sans-serif', fontWeight:'bold', fontStyle:'normal',
        color:'#1a1a1a', align:'center', verticalAlign:'middle', letterSpacing:1, lineHeight:1.2 }
    ];
  }

  // 標準モードの初期DOMを保持（テンプレ→標準へ戻すとき復元）
  const STANDARD_HTML = document.getElementById('sheet').innerHTML;

  // ===== 標準モード（従来）=====
  function setSize(s) {
    document.body.classList.remove('size-meishi', 'size-official');
    document.body.classList.add('size-' + s);
    renderCodes();
  }
  function setCodeType(t) {
    document.body.classList.remove('code-qr', 'code-code128');
    document.body.classList.add('code-' + t);
    renderCodes();
  }

  function renderCodes() {
    const type = document.querySelector('input[name="codetype"]:checked').value;
    const isOfficial = document.body.classList.contains('size-official');
    const areas = document.querySelectorAll('#sheet .code-area');
    areas.forEach(function(area) {
      const code = area.getAttribute('data-code');
      area.innerHTML = '';
      if (type === 'qr') {
        new QRCode(area, {
          text: code,
          width: 320, height: 320,
          correctLevel: QRCode.CorrectLevel.M
        });
      } else {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        area.appendChild(svg);
        try {
          JsBarcode(svg, code, {
            format: 'CODE128',
            displayValue: false,
            margin: 0,
            height: isOfficial ? 90 : 70,
            width: isOfficial ? 2.4 : 2.0
          });
        } catch (e) {
          area.textContent = code;
        }
      }
    });
  }

  // ===== テンプレートモード =====
  // フィールド差し込み（{race_name} {racer_name} {seq} {code}）
  function fillField(o, c) {
    let s = (o.field != null ? o.field : (o.text != null ? o.text : (o.preview || '')));
    const nameVal = c.blank ? '' : (c.name || '');
    return String(s)
      .replace(/\{race_name\}/g, RACE_NAME)
      .replace(/\{racer_name\}/g, nameVal)
      .replace(/\{seq\}/g, c.code)
      .replace(/\{code\}/g, c.code);
  }

  // コード（QR/バーコード）を枠いっぱいに描画
  function renderCodeInto(box, code, type) {
    box.innerHTML = '';
    if (type === 'qr') {
      const holder = document.createElement('div');
      holder.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;';
      box.appendChild(holder);
      try {
        new QRCode(holder, { text: code, width: 512, height: 512, correctLevel: QRCode.CorrectLevel.M });
        // qrcode.js は canvas と img を両方生成する。1つだけ残し、枠ぴったり＋ドットを潰さない設定にする。
        const node = holder.querySelector('img') || holder.querySelector('canvas') || holder.querySelector('table');
        holder.querySelectorAll('img,canvas,table').forEach(function(n){ if (n !== node) n.remove(); });
        if (node) {
          // 両方を重ね書き：理解できるブラウザは pixelated を採用、古いSafariは前者にフォールバック
          node.style.cssText += ';width:100%;height:100%;object-fit:contain;'
            + 'image-rendering:-webkit-optimize-contrast;image-rendering:pixelated;';
        }
      } catch (e) { box.textContent = code; }
    } else {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.style.cssText = 'width:100%;height:100%;';
      svg.setAttribute('preserveAspectRatio', 'none');
      box.appendChild(svg);
      try {
        JsBarcode(svg, code, { format: 'CODE128', displayValue: false, margin: 0, height: 80, width: 2 });
      } catch (e) { box.textContent = code; }
    }
  }

  function renderTemplateCards(tpl) {
    const [wmm, hmm] = CARD_DIMS[tpl.card_size] || CARD_DIMS.meishi;
    const codeType = tpl.code_type || 'qr';
    const layout = tpl.layout || {};
    let objects = layout.objects || [];
    if (!objects.length) objects = defaultCardObjs();   // 空テンプレートは既定配置で描画
    const bg = layout.bg_image_url || '';
    const va = { top: 'flex-start', middle: 'center', bottom: 'flex-end' };

    const sheet = document.getElementById('sheet');
    sheet.innerHTML = '';

    CARDS.forEach(function(c) {
      const card = document.createElement('div');
      card.className = 'tpl-card';
      card.style.width = wmm + 'mm';
      card.style.height = hmm + 'mm';
      if (bg) {
        card.style.backgroundImage = 'url("' + bg + '")';
        card.style.backgroundSize = 'cover';
        card.style.backgroundPosition = 'center';
      }

      objects.forEach(function(o) {
        const box = document.createElement('div');
        const left = (o.x / MM2PX), top = (o.y / MM2PX), w = (o.w / MM2PX), h = (o.h / MM2PX);
        box.style.cssText = 'position:absolute;overflow:hidden;'
          + 'left:' + left + 'mm;top:' + top + 'mm;width:' + w + 'mm;height:' + h + 'mm;';

        if (o.type === 'code') {
          renderCodeInto(box, c.code, codeType);
        } else if (o.type === 'image') {
          if (o.imageUrl) {
            const img = document.createElement('img');
            img.src = o.imageUrl;
            img.style.cssText = 'width:100%;height:100%;object-fit:' + (o.objectFit || 'contain') + ';';
            box.appendChild(img);
          }
        } else {
          box.style.display = 'flex';
          box.style.alignItems = va[o.verticalAlign || 'middle'];
          const inner = document.createElement('div');
          inner.style.cssText = 'width:100%;'
            + 'font-size:' + (o.fontSize / MM2PX) + 'mm;'
            + 'font-family:' + o.fontFamily + ';'
            + 'font-weight:' + o.fontWeight + ';'
            + 'font-style:' + o.fontStyle + ';'
            + 'color:' + o.color + ';'
            + 'text-align:' + o.align + ';'
            + 'letter-spacing:' + (o.letterSpacing / MM2PX) + 'mm;'
            + 'line-height:' + o.lineHeight + ';';
          inner.textContent = fillField(o, c);
          box.appendChild(inner);
        }
        card.appendChild(box);
      });

      sheet.appendChild(card);
    });
  }

  // ===== 表示（テンプレートを適用。標準モードは廃止）=====
  function applyView() {
    const sel = document.getElementById('tplSelect');
    const val = sel && sel.value ? sel.value : '';
    if (val) {
      const tpl = CARD_TEMPLATES.find(function(t){ return String(t.id) === String(val); });
      if (tpl) { renderTemplateCards(tpl); return; }
    }
    // テンプレートが1件も無い場合の保険：既定配置（名刺QR）で描画して白画面を防ぐ
    renderTemplateCards({ card_size: 'meishi', code_type: 'qr', layout: { objects: defaultCardObjs() } });
  }

  // 初期描画（Webフォント読み込み完了を待ってから描画）
  function startRender() {
    if (window.QRCode) {
      applyView();
    } else {
      window.addEventListener('load', applyView);
    }
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(startRender);
  } else {
    startRender();
  }
</script>
</body>
</html>
