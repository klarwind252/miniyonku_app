server {
    server_name os3-372-19089.vs.sakura.ne.jp;
    root /var/www/miniyonku_public;
    index index.html;

    # アップロード上限（BGMのmp3・賞状背景画像など）。
    # 未指定だと 1MB でアプリに届く前に nginx が 413 を返すため緩和する。
    client_max_body_size 50M;

    # 店舗1（既定）の参加者ページ
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store";
    }

    # アプリへのプロキシ（店舗1：スラッグなし）  ※ enter を追加
    location ~ ^/(admin|view|static|health|logo|api|enter) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # クライアント由来の内部制御ヘッダを破棄（store コンテキスト注入を防止）
        proxy_set_header x-internal-store-id "";
        proxy_read_timeout 120s;
    }

    # アプリへのプロキシ（店舗2〜：/{slug}/(admin|view|...)）
    # スラッグはアプリ側（StoreResolverMiddleware）で解釈・除去する。
    location ~ ^/[a-z0-9][a-z0-9-]*/(admin|view|static|health|logo|api|enter) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # クライアント由来の内部制御ヘッダを破棄（store コンテキスト注入を防止）
        proxy_set_header x-internal-store-id "";
        proxy_read_timeout 120s;
    }

    # 店舗2〜の参加者ページ（/{slug} または /{slug}/）
    # 上のプロキシ群に一致しなかった単一セグメントのみここに来る＝スラッグのルート。
    location ~ ^/([a-z0-9][a-z0-9-]*)/?$ {
        try_files /$1/index.html =404;
        add_header Cache-Control "no-store";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/os3-372-19089.vs.sakura.ne.jp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/os3-372-19089.vs.sakura.ne.jp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = os3-372-19089.vs.sakura.ne.jp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name os3-372-19089.vs.sakura.ne.jp;
    return 404; # managed by Certbot
}
