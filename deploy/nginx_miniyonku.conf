server {
    server_name <VPSホスト名>;
    root /var/www/miniyonku_public;
    index index.html;

    # アップロード上限（BGMのmp3・賞状背景画像など）。
    # 未指定だと 1MB でアプリに届く前に nginx が 413 を返すため緩和する。
    client_max_body_size 50M;

    # ---- gzip 圧縮（参加者向けHTMLの一斉取得時の転送量を削減） ----
    # 観覧HTMLが更新された瞬間、最大1,000名がほぼ同時にフルHTMLを取得する。
    # gzip で HTML/CSS/JS の転送量を概ね 1/5〜1/10 に圧縮し、帯域とレスポンスを改善する。
    # 画像（png/jpg/woff2）は既に圧縮済みのため対象外（二重圧縮しない）。
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # 店舗1（既定）の参加者ページ
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store";
    }

    # アプリへのプロキシ（店舗1：スラッグなし）  ※ enter を追加
    location ~ ^/(admin|view|static|health|logo|api|enter) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # クライアント由来の内部制御ヘッダを破棄（store コンテキスト注入を防止）
        proxy_set_header x-internal-store-id "";
        proxy_read_timeout 120s;
    }

    # アプリへのプロキシ（店舗2〜：/{slug}/(admin|view|...)）
    # スラッグはアプリ側（StoreResolverMiddleware）で解釈・除去する。
    location ~ ^/[a-z0-9][a-z0-9-]*/(admin|view|static|health|logo|api|enter) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # クライアント由来の内部制御ヘッダを破棄（store コンテキスト注入を防止）
        proxy_set_header x-internal-store-id "";
        proxy_read_timeout 120s;
    }

    # 店舗2〜の参加者ページ（/{slug} または /{slug}/）
    # 上のプロキシ群に一致しなかった単一セグメントのみここに来る＝スラッグのルート。
    location ~ ^/([a-z0-9][a-z0-9-]*)/?$ {
        try_files /$1/index.html =404;
        add_header Cache-Control "no-store";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/<VPSホスト名>/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/<VPSホスト名>/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = <VPSホスト名>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name <VPSホスト名>;
    return 404; # managed by Certbot
}
