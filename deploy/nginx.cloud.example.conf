# クラウド版 nginx 設定例（要点のみ）
#
# 目的:
#   1. 内部レンダリング用ヘッダを外部リクエストから必ず除去する
#      （x-internal-store-id / x-internal-render-secret を攻撃者に偽装させない）。
#   2. HTTPS終端していることをアプリへ正しく伝える（X-Forwarded-Proto）。
#      アプリの HTTPS 強制ミドルウェアはこの値を見て判定する。
#
# 注意:
#   - proxy_set_header に "" を渡すと、そのヘッダはアップストリームへ送られない。
#   - 参加者向け静的HTMLは nginx 直配信のままでよい（この proxy は admin/view/api 等）。

server {
    listen 443 ssl http2;
    server_name  your-host.example.jp;

    # ssl_certificate      /etc/ssl/...;
    # ssl_certificate_key  /etc/ssl/...;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # (1) 内部専用ヘッダを外部から必ず除去（偽装防止）
        proxy_set_header x-internal-store-id      "";
        proxy_set_header x-internal-render-secret "";

        # (2) HTTPS 終端を伝える
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# HTTP は HTTPS へ恒久リダイレクト
server {
    listen 80;
    server_name your-host.example.jp;
    return 308 https://$host$request_uri;
}
